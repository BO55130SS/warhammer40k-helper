<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Warhammer 40K Helper</title>
<style>
body{
  margin:0;
  background:#111;
  color:white;
  font-family:Arial, sans-serif;
}
header{
  background:#222;
  padding:12px;
  text-align:center;
  border-bottom:2px solid #555;
}
.round{
  font-size:20px;
  font-weight:bold;
}
.phase{
  color:#ffd966;
  margin-top:6px;
}
.player{
  padding:12px;
  border-bottom:2px solid #333;
}
.active{
  background:#1d2b3a;
}
.inactive{
  background:#2a1d1d;
}
h2{
  margin:0 0 8px;
}
.status{
  display:flex;
  gap:10px;
  margin-bottom:10px;
}
.badge{
  background:#333;
  padding:6px 10px;
  border-radius:8px;
}
.box{
  background:rgba(255,255,255,0.08);
  padding:10px;
  border-radius:8px;
  margin-bottom:10px;
}
.box-title{
  color:#ffd966;
  font-weight:bold;
  margin-bottom:6px;
}
ul{
  margin:0;
  padding-left:20px;
}
footer{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:#222;
  display:flex;
  gap:8px;
  padding:10px;
}
button{
  flex:1;
  padding:14px;
  font-size:16px;
  border:none;
  border-radius:8px;
  color:white;
  background:#444;
}
.next{
  background:#0078d7;
}
main{
  padding-bottom:80px;
}
</style>
</head>

<body>

<header>
  <div class="round">第1バトルラウンド</div>
  <div class="phase">現在：スペースマリーンのコマンドフェイズ</div>
</header>

<main>

<section class="player active">
  <h2>先攻：スペースマリーン</h2>
  <div class="status">
    <div class="badge">CP：0</div>
    <div class="badge">VP：0</div>
  </div>

  <div class="box">
    <div class="box-title">今やること</div>
    <ul>
      <li>CPを1増やす</li>
      <li>バトルショックを確認する</li>
      <li>コマンドフェイズ能力を確認する</li>
      <li>ミッションを確認する</li>
    </ul>
  </div>

  <div class="box">
    <div class="box-title">使用可能</div>
    <ul>
      <li>戦闘の誓い：未使用</li>
      <li>コマンドリロール：使用可能</li>
    </ul>
  </div>

  <div class="box">
    <div class="box-title">使用済み</div>
    <ul>
      <li>なし</li>
    </ul>
  </div>
</section>

<section class="player inactive">
  <h2>後攻：オルク</h2>
  <div class="status">
    <div class="badge">CP：0</div>
    <div class="badge">VP：0</div>
  </div>

  <div class="box">
    <div class="box-title">今できること</div>
    <ul>
      <li>相手の処理を確認する</li>
      <li>このタイミングで使える能力があれば使用する</li>
    </ul>
  </div>

  <div class="box">
    <div class="box-title">割り込み可能</div>
    <ul>
      <li>コマンドリロール：使用可能</li>
      <li>1ゲーム1回能力：未使用</li>
    </ul>
  </div>

  <div class="box">
    <div class="box-title">使用済み</div>
    <ul>
      <li>なし</li>
    </ul>
  </div>
</section>

</main>

<footer>
  <button>戻る</button>
  <button>質問</button>
  <button class="next">完了して次へ</button>
</footer>

</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Warhammer 40K Helper</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="setupScreen" class="screen active">
  <header>
    <div class="round">Warhammer 40K Helper</div>
    <div class="phase">Ver.0.6 ゲーム開始設定</div>
  </header>

  <main class="setup">
    <div class="card">
      <label>プレイヤー1の勢力</label>
      <select id="player1Faction"></select>

      <label>プレイヤー1のデタッチメント</label>
      <select id="player1Detachment"></select>

      <label>プレイヤー2の勢力</label>
      <select id="player2Faction"></select>

      <label>プレイヤー2のデタッチメント</label>
      <select id="player2Detachment"></select>

      <p class="note">
        勢力とデタッチメントを選んでゲームを開始します。
      </p>
    </div>

    <button class="primary" onclick="startGame()">ゲーム開始</button>
  </main>
</div>

<div id="gameScreen" class="screen">
  <header>
    <div class="round" id="roundText">第1バトルラウンド</div>
    <div class="phase" id="phaseText">現在：コマンドフェイズ</div>
  </header>

  <main>
    <section class="player active-player">
      <h2 id="player1Title">先攻</h2>

      <div class="status">
        <div class="badge">CP：<span id="p1cp">0</span></div>
        <div class="badge">VP：<span id="p1vp">0</span></div>
      </div>

      <div class="box">
        <div class="box-title">デタッチメント</div>
        <ul>
          <li id="player1DetachmentText">未選択</li>
        </ul>
      </div>

      <div class="box">
        <div class="box-title">アーミールール</div>
        <ul id="player1ArmyRules"></ul>
      </div>

      <div class="box">
        <div class="box-title">今やること</div>
        <ul id="activeTasks"></ul>
      </div>
    </section>

    <section class="player inactive-player">
      <h2 id="player2Title">後攻</h2>

      <div class="status">
        <div class="badge">CP：<span id="p2cp">0</span></div>
        <div class="badge">VP：<span id="p2vp">0</span></div>
      </div>

      <div class="box">
        <div class="box-title">デタッチメント</div>
        <ul>
          <li id="player2DetachmentText">未選択</li>
        </ul>
      </div>

      <div class="box">
        <div class="box-title">相手のアーミールール</div>
        <ul id="player2ArmyRules"></ul>
      </div>

      <div class="box important">
        <div class="box-title">相手が今できること</div>
        <ul id="inactiveTasks"></ul>
      </div>
    </section>
  </main>

  <footer>
    <button onclick="backToSetup()">設定へ戻る</button>
    <button>質問</button>
    <button class="primary">完了して次へ</button>
  </footer>
</div>

<script src="data.js"></script>
<script src="script.js"></script>

</body>
</html>
